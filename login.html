<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | MedConnect</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="page-with-sticky-footer">
  <main class="form-shell">
    <section class="card">
      <p class="kicker">Welcome Back</p>
      <h1>Login</h1>
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button class="btn" type="submit">Sign In</button>
        <p class="helper" style="margin-top: 1rem;">New here? <a href="newreg.html">Create an account</a></p>
        <div id="loginFeedback" class="feedback" role="status" aria-live="polite"></div>
      </form>
    </section>
  </main>

  <script src="assets/js/main.js"></script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", async function (event) {
      event.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        showFeedback("loginFeedback", "error", "Please enter both username and password.");
        return;
      }

      try {
        const data = await AppApi.request("/auth/login", {
          method: "POST",
          body: JSON.stringify({ username, password })
        });
        AppApi.setAuth(data.token, data.user);
        showFeedback("loginFeedback", "success", "Login successful. Redirecting...");
        setTimeout(function () {
          window.location.href = "project.html";
        }, 700);
      } catch (error) {
        showFeedback("loginFeedback", "error", error.message);
      }
    });
  </script>
</body>
</html>
